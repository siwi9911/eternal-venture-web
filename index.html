<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal Venture</title>

<link rel="icon" href="media/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
:root{
--gold:#ffd700;
--dark:#0a0a0a;
}

body{
margin:0;
font-family:'Space Grotesk',sans-serif;
color:white;
background:black;
overflow-x:hidden;
}

#bgVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.3);
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

.nav-left{
display:flex;
align-items:center;
gap:10px;
}

.nav-logo{
width:40px;
}

.hero{
text-align:center;
padding-top:140px;
}

.hero-logo{
width:200px;
animation:float 4s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.gold{color:gold;}

.ip-btn{
padding:15px 25px;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.discord-btn{
padding:15px 25px;
background:#5865F2;
border-radius:10px;
text-decoration:none;
color:white;
}

.status{
margin-top:20px;
}

.vip-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
max-width:900px;
margin:30px auto;
gap:20px;
}

.vip-card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
text-align:center;
}

.vip-price{
font-size:25px;
color:gold;
}

.section{
padding:40px;
}

</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="media/background.mp4" type="video/mp4">
</video>

<div id="particles-js"></div>

<nav class="navbar">
<div class="nav-left">
<img src="media/logo_small.png" class="nav-logo">
<b>Eternal Venture</b>
</div>
</nav>

<section class="hero">

<img src="media/logo.png" class="hero-logo">

<h1>Vítej na <span class="gold">Eternal Venture</span></h1>

<p>Survival, Ekonomika a PvP server</p>

<button class="ip-btn" onclick="copyIP()">play.eternalventure.cz</button>
<a class="discord-btn" href="https://discord.gg/F3MRKq9ceH" target="_blank">Discord</a>

<div class="status">
<div id="status">Načítání...</div>
<div id="players"></div>
</div>

<div id="heads"></div>

</section>

<section class="section">
<h2>💎 VIP</h2>

<div class="vip-grid">

<div class="vip-card">
<h3>NORMAL</h3>
<p>
✔ základní výhody<br>
✔ bonus peníze<br>
✔ zvýrazněné jméno
</p>
<div class="vip-price">49 Kč</div>
<a href="https://discord.gg/F3MRKq9ceH" target="_blank">Koupit</a>
</div>

<div class="vip-card">
<h3>VIP+</h3>
<p>
✔ vše z NORMAL<br>
✔ vyšší výdělky<br>
✔ exkluzivní příkazy<br>
✔ speciální prefix
</p>
<div class="vip-price">99 Kč</div>
<a href="https://discord.gg/F3MRKq9ceH" target="_blank">Koupit</a>
</div>

</div>
</section>

<script>
function copyIP(){
navigator.clipboard.writeText("play.eternalventure.cz");
alert("IP zkopírována");
}

async function loadServer(){
let res=await fetch("https://api.mcsrvstat.us/2/play.eternalventure.cz");
let data=await res.json();

if(data.online){
document.getElementById("status").innerHTML="🟢 ONLINE";
document.getElementById("players").innerHTML="Hráči: "+data.players.online+"/"+data.players.max;

if(data.players.list){
document.getElementById("heads").innerHTML=
data.players.list.map(p=>`<img src="https://mc-heads.net/avatar/${p}" width="40">`).join("");
}
}else{
document.getElementById("status").innerHTML="🔴 OFFLINE";
}
}

loadServer();
setInterval(loadServer,30000);

particlesJS("particles-js",{
particles:{number:{value:60},color:{value:"#ffd700"},size:{value:2}}
});
</script>

</body>
</html>
